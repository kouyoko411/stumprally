<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スタッフ用 付与ツール｜スタンプラリー</title>
<style>
  :root{
    --aqua-50:#f0fbff; --aqua-100:#e0f6ff; --aqua-200:#c2ecfb;
    --aqua-300:#9adcf3; --aqua-400:#5cc4e8; --aqua-500:#2ba6d4;
    --aqua-600:#1b87b5; --aqua-700:#166b91; --ink:#0f3a4a;
    --ink-soft:#4a7285; --danger:#e2556b; --shadow:0 8px 28px rgba(27,135,181,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;
    color:var(--ink);background:linear-gradient(160deg,#eafaff 0%,#d5f1fb 45%,#c2ecfb 100%);min-height:100vh}
  .app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .topbar{padding:18px 20px 14px;display:flex;align-items:center;gap:10px;
    background:linear-gradient(120deg,#166b91,#1b87b5);color:#fff;box-shadow:var(--shadow);
    border-bottom-left-radius:22px;border-bottom-right-radius:22px}
  .topbar .logo{font-size:26px}
  .topbar h1{font-size:17px;margin:0;font-weight:700}
  .topbar .sub{font-size:11px;opacity:.9;margin-top:1px}
  .content{flex:1;padding:18px 18px 40px}
  .card{background:#fff;border-radius:20px;padding:22px;box-shadow:var(--shadow);border:1px solid var(--aqua-100)}
  .card + .card{margin-top:16px}
  h2{font-size:16px;margin:0 0 14px;display:flex;align-items:center;gap:8px}
  label{font-size:13px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:6px}
  input{width:100%;padding:14px;border:2px solid var(--aqua-200);border-radius:14px;font-size:17px;color:var(--ink);background:var(--aqua-50)}
  input:focus{outline:none;border-color:var(--aqua-400);background:#fff;box-shadow:0 0 0 4px rgba(92,196,232,.18)}
  .btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;color:#fff;
    background:linear-gradient(120deg,var(--aqua-500),var(--aqua-600));box-shadow:0 6px 16px rgba(27,135,181,.3);cursor:pointer;margin-top:6px}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
  .err{color:var(--danger);font-size:13px;margin-top:8px;font-weight:600;min-height:18px}
  .row{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1px solid var(--aqua-100);font-size:14px}
  .modal{position:fixed;inset:0;background:rgba(9,40,52,.45);display:flex;align-items:center;justify-content:center;padding:24px;z-index:20}
  .modal .box{background:#fff;border-radius:24px;padding:28px 24px;text-align:center;max-width:340px;width:100%;box-shadow:var(--shadow);animation:pop .3s cubic-bezier(.2,1.3,.5,1)}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .modal .emoji{font-size:54px}
  .modal h3{margin:8px 0 4px;font-size:20px}
  .modal .big{font-size:40px;font-weight:800;color:var(--aqua-600);margin:6px 0}
  .spin{display:inline-block;width:18px;height:18px;border:3px solid var(--aqua-200);border-top-color:var(--aqua-500);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  select{width:100%;padding:12px;border:2px solid var(--aqua-200);border-radius:12px;font-size:16px;background:var(--aqua-50);color:var(--ink)}
  .locpick{display:flex;gap:8px;margin:10px 0}
  .locpick button{flex:1;padding:12px;border:2px solid var(--aqua-200);background:#fff;border-radius:12px;font-size:15px;font-weight:800;color:var(--aqua-700)}
  .locpick button.on{background:var(--aqua-500);color:#fff;border-color:var(--aqua-500)}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin:6px 0 8px}
  .calhead button{border:2px solid var(--aqua-200);background:#fff;color:var(--aqua-600);border-radius:10px;width:38px;height:38px;font-size:18px;font-weight:800}
  .calhead .mon{font-weight:800;font-size:16px}
  .cal2{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;touch-action:none;-webkit-user-select:none;user-select:none}
  .cal2 .dow{text-align:center;font-size:11px;color:var(--ink-soft);font-weight:700}
  .cal2 .cell{aspect-ratio:1;border:2px solid var(--aqua-100);border-radius:10px;background:#fff;position:relative;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer}
  .cal2 .cell.empty{border:none;background:transparent;cursor:default}
  .cal2 .cell.on{background:linear-gradient(150deg,#d9f2ff,#fff);border-color:var(--aqua-500);color:var(--aqua-700)}
  .cal2 .cell .lo{position:absolute;bottom:1px;left:0;right:0;text-align:center;font-size:9px;font-weight:800;color:#fff;background:var(--aqua-600);line-height:1.5;border-bottom-left-radius:8px;border-bottom-right-radius:8px}
  .cal2 .cell .cnt{position:absolute;top:1px;right:3px;font-size:8px;font-weight:800;color:var(--ink-soft)}
  .cal2 .cell.today2{box-shadow:0 0 0 2px var(--aqua-300) inset}
  .savemsg{font-size:12px;font-weight:700;color:var(--aqua-600);min-height:16px;margin-top:8px}
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="logo">🧑‍🏫</span>
    <div><h1>スタッフ用 付与ツール</h1><div class="sub">QRが読めない生徒の代替手段</div></div>
  </div>
  <div class="content">
    <div class="card">
      <h2>➕ ポイントを付与</h2>
      <label>生徒番号（7〜8桁の数字）</label>
      <input type="tel" id="stId" inputmode="numeric" placeholder="例：12345678" maxlength="8">
      <label style="margin-top:14px">授業数（0〜10）</label>
      <input type="number" id="stCnt" min="0" max="10" value="1">
      <div class="err" id="stErr"></div>
      <button class="btn" id="stBtn" onclick="grant()">付与する</button>
      <div class="hint">※ その日最初の付与で登校ポイント+1。0（自習）は1日1回まで。付与履歴はスプレッドシートに記録されます。</div>
    </div>
    <div class="card">
      <h2>🎪 English Camp 出席付与（+10）</h2>
      <label>生徒番号（7〜8桁の数字）</label>
      <input type="tel" id="evId" inputmode="numeric" placeholder="例：12345678" maxlength="8">
      <div class="err" id="evErr"></div>
      <button class="btn" id="evBtn" onclick="grantEvent()">English Camp を付与（+10pt）</button>
      <div class="hint">※ 1人につき1回まで。2回目以降は「受け取り済み」になります。生徒がイベントQRを自分で読み取ってもOK。</div>
    </div>
    <div class="card">
      <h2>📅 配置カレンダー入力</h2>
      <label>スタッフを選ぶ</label>
      <select id="calStaff" onchange="onStaffChange()"><option>読み込み中…</option></select>
      <div class="locpick">
        <button id="locWest" class="on" onclick="pickLoc('西口')">西口</button>
        <button id="locEast" onclick="pickLoc('東口')">東口</button>
      </div>
      <div class="calhead">
        <button onclick="calStep(-1)">‹</button>
        <div class="mon" id="calMon2">—</div>
        <button onclick="calStep(1)">›</button>
      </div>
      <div class="cal2" id="cal2"></div>
      <div class="savemsg" id="saveMsg"></div>
      <div class="hint">日付をタップで「選んだスタッフ・場所」を割り当て／解除。<b>ドラッグ（なぞる）で連続割り当て</b>。同じ日をもう一度タップで解除、別の場所を選んで押すと変更。右上の小さな数字はその日の配置人数です。</div>
    </div>
    <div class="card">
      <h2>🧾 直近の付与</h2>
      <div id="stLog"><div class="hint" style="margin:0">まだ付与はありません。</div></div>
    </div>
  </div>
</div>
<script>
/* ====================================================================
 *  設定：GASウェブアプリ(API)の /exec URL を貼る（生徒用と同じURL）
 * ==================================================================== */
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwxA0SMa4kK41IB8QXR4-HY7wH0Tr_-E_FYNFxjzbkiI61rKHSTpkSZDvgYfnYgg3ywew/exec';
/* ==================================================================== */

var log=[];
function api(action, payload){
  return fetch(GAS_URL, {method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(Object.assign({action:action},payload||{}))}).then(function(r){return r.json();});
}
function grant(){
  var id=document.getElementById('stId').value.trim();
  var cnt=parseInt(document.getElementById('stCnt').value,10);
  var e=document.getElementById('stErr'); e.textContent='';
  if(!/^[0-9]+$/.test(id)||id.length<7||id.length>8){e.textContent='生徒番号は7〜8桁の数字で入力してください';return;}
  if(isNaN(cnt)||cnt<0||cnt>10){e.textContent='授業数は0〜10で入力してください';return;}
  var b=document.getElementById('stBtn'); b.disabled=true; b.innerHTML='送信中… <span class="spin"></span>';
  api('staffGrant',{studentId:id, lessons:cnt}).then(function(r){
    b.disabled=false; b.textContent='付与する';
    if(!r.ok){ e.textContent=r.msg; return; }
    var total=(r.attend||0)+(r.added||0);
    var t=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    log.unshift(t+'　生徒 '+id+' に +'+total+'pt'+(r.attend?'（登校込）':''));
    document.getElementById('stLog').innerHTML=log.slice(0,10).map(function(l){return '<div class="row">'+l+'</div>';}).join('');
    document.getElementById('stId').value=''; document.getElementById('stCnt').value=1;
    modal('✅','付与しました','生徒 '+id+'<br>+'+total+' pt');
  }).catch(function(){
    b.disabled=false; b.textContent='付与する'; e.textContent='通信エラー。もう一度お試しください。';
  });
}
function grantEvent(){
  var id=document.getElementById('evId').value.trim();
  var e=document.getElementById('evErr'); e.textContent='';
  if(!/^[0-9]+$/.test(id)||id.length<7||id.length>8){e.textContent='生徒番号は7〜8桁の数字で入力してください';return;}
  var b=document.getElementById('evBtn'); b.disabled=true; b.innerHTML='送信中… <span class="spin"></span>';
  api('event',{studentId:id, event:'englishcamp'}).then(function(r){
    b.disabled=false; b.textContent='English Camp を付与（+10pt）';
    if(!r.ok){ e.textContent=r.msg; return; }
    var t=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    log.unshift(t+'　生徒 '+id+' に '+(r.eventName||'イベント')+' +'+r.added+'pt');
    document.getElementById('stLog').innerHTML=log.slice(0,10).map(function(l){return '<div class="row">'+l+'</div>';}).join('');
    document.getElementById('evId').value='';
    modal('🎪','付与しました','生徒 '+id+'<br>+'+r.added+' pt');
  }).catch(function(){
    b.disabled=false; b.textContent='English Camp を付与（+10pt）'; e.textContent='通信エラー。もう一度お試しください。';
  });
}
function modal(emoji,title,big){
  var m=document.createElement('div'); m.className='modal';
  m.innerHTML='<div class="box"><div class="emoji">'+emoji+'</div><h3>'+title+'</h3><div class="big">'+big+'</div><button class="btn" style="margin-top:16px">OK</button></div>';
  m.querySelector('button').onclick=function(){m.remove();};
  document.body.appendChild(m);
}

/* ========= 配置カレンダー入力 ========= */
var calStaffId=null, calLoc='西口', calY=null, calM=null; // calM:0-11
var monthRows=[];          // その月の全配置 [{date,staffId,location}]
var myMap={};              // 選択スタッフの日付->場所
var dayCount={};           // 日付->その日の配置人数
var painting=false, paintMode='add', touched={};

function esc2(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function p2(n){return (n<10?'0':'')+n;}
function ymStr(){return calY+'-'+p2(calM+1);}
function dstr(day){return calY+'-'+p2(calM+1)+'-'+p2(day);}

window.addEventListener('load', function(){
  var d=new Date(); calY=d.getFullYear(); calM=d.getMonth();
  api('staffMaster',{}).then(function(r){
    var sel=document.getElementById('calStaff');
    if(!r||!r.ok||!r.staff.length){ sel.innerHTML='<option>スタッフ未登録</option>'; return; }
    sel.innerHTML=r.staff.map(function(s){
      var label=(s.fullName?s.fullName:s.name)+'（'+s.id+'）';
      return '<option value="'+esc2(s.id)+'">'+esc2(label)+'</option>';
    }).join('');
    calStaffId=r.staff[0].id;
    loadMonth();
  }).catch(function(){ document.getElementById('calStaff').innerHTML='<option>読み込み失敗</option>'; });
});
function onStaffChange(){ calStaffId=document.getElementById('calStaff').value; rebuildMaps(); renderCal2(); }
function pickLoc(loc){ calLoc=loc;
  document.getElementById('locWest').classList.toggle('on',loc==='西口');
  document.getElementById('locEast').classList.toggle('on',loc==='東口');
}
function calStep(delta){ calM+=delta; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} loadMonth(); }

function loadMonth(){
  document.getElementById('cal2').innerHTML='<div class="hint" style="grid-column:1/-1;margin:0">読み込み中… <span class="spin"></span></div>';
  api('scheduleMonth',{ym:ymStr()}).then(function(r){
    monthRows=(r&&r.rows)||[]; rebuildMaps(); renderCal2();
  }).catch(function(){ document.getElementById('cal2').innerHTML='<div class="hint" style="grid-column:1/-1">読み込み失敗</div>'; });
}
function rebuildMaps(){
  myMap={}; dayCount={};
  monthRows.forEach(function(row){
    dayCount[row.date]=(dayCount[row.date]||0)+1;
    if(row.staffId===calStaffId) myMap[row.date]=row.location||'（未設定）';
  });
}
function renderCal2(){
  document.getElementById('calMon2').textContent=calY+'年 '+(calM+1)+'月';
  var startDow=new Date(calY,calM,1).getDay();
  var days=new Date(calY,calM+1,0).getDate();
  var today=(new Date()).getFullYear()+'-'+p2((new Date()).getMonth()+1)+'-'+p2((new Date()).getDate());
  var html='';
  ['日','月','火','水','木','金','土'].forEach(function(d){html+='<div class="dow">'+d+'</div>';});
  for(var i=0;i<startDow;i++) html+='<div class="cell empty"></div>';
  for(var day=1;day<=days;day++){
    var ds=dstr(day);
    var on=!!myMap[ds];
    html+='<div class="cell'+(on?' on':'')+(ds===today?' today2':'')+'" data-d="'+ds+'">'
      +(dayCount[ds]?'<span class="cnt">'+dayCount[ds]+'</span>':'')
      +day
      +(on?'<span class="lo">'+esc2(myMap[ds].charAt(0))+'</span>':'')
      +'</div>';
  }
  document.getElementById('cal2').innerHTML=html;
  bindCells();
}
function bindCells(){
  document.querySelectorAll('#cal2 .cell:not(.empty)').forEach(function(c){
    c.addEventListener('pointerdown',function(e){
      e.preventDefault();
      painting=true; touched={};
      var ds=c.getAttribute('data-d');
      // モード決定：未割当→add / 同じ場所→remove / 別の場所→add(変更)
      var cur=myMap[ds];
      paintMode=(!cur)?'add':(cur===calLoc?'remove':'add');
      applyCell(ds);
    });
  });
}
/* ドラッグ中：指/マウス直下のマスを探して塗る（タッチでも動く） */
document.addEventListener('pointermove',function(e){
  if(!painting) return;
  var el=document.elementFromPoint(e.clientX, e.clientY);
  var cell=el&&el.closest?el.closest('.cell'):null;
  if(cell && !cell.classList.contains('empty')){
    var ds=cell.getAttribute('data-d');
    if(ds) applyCell(ds);
  }
});
function applyCell(ds){
  if(touched[ds]) return; touched[ds]=true;
  if(paintMode==='add'){ myMap[ds]=calLoc; }
  else { delete myMap[ds]; }
  // 即時再描画（該当セルのみ更新）
  var c=document.querySelector('#cal2 .cell[data-d="'+ds+'"]'); if(!c) return;
  var day=parseInt(ds.slice(8),10);
  var on=!!myMap[ds];
  c.className='cell'+(on?' on':'');
  c.innerHTML=(dayCount[ds]?'<span class="cnt">'+dayCount[ds]+'</span>':'')+day+(on?'<span class="lo">'+esc2((myMap[ds]||'').charAt(0))+'</span>':'');
}
document.addEventListener('pointerup',function(){
  if(!painting) return; painting=false;
  var dates=Object.keys(touched); if(!dates.length) return;
  var msg=document.getElementById('saveMsg'); msg.textContent='保存中…';
  var action=(paintMode==='add')?'scheduleBulkSet':'scheduleBulkRemove';
  var payload=(paintMode==='add')?{staffId:calStaffId,location:calLoc,dates:dates}:{staffId:calStaffId,dates:dates};
  api(action,payload).then(function(r){
    if(!r||!r.ok){ msg.textContent='保存に失敗しました。もう一度お試しください。'; return; }
    // ローカルの月データを更新（人数カウント整合のため反映）
    dates.forEach(function(ds){
      monthRows=monthRows.filter(function(x){return !(x.staffId===calStaffId && x.date===ds);});
      if(paintMode==='add') monthRows.push({date:ds,staffId:calStaffId,location:calLoc});
    });
    rebuildMaps(); renderCal2();
    msg.textContent='保存しました（'+dates.length+'日分）';
    setTimeout(function(){ if(msg.textContent.indexOf('保存しました')===0) msg.textContent=''; },2500);
  }).catch(function(){ msg.textContent='通信エラー。もう一度お試しください。'; });
});
</script>
</body>
</html>
