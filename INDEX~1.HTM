<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QRスキャン｜スタンプラリー</title>
<style>
  :root{
    --aqua-50:#f0fbff; --aqua-100:#e0f6ff; --aqua-200:#c2ecfb;
    --aqua-300:#9adcf3; --aqua-400:#5cc4e8; --aqua-500:#2ba6d4;
    --aqua-600:#1b87b5; --aqua-700:#166b91; --ink:#0f3a4a;
    --ink-soft:#4a7285; --danger:#e2556b;
    --shadow:0 8px 28px rgba(27,135,181,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;
    color:var(--ink);background:linear-gradient(160deg,#eafaff 0%,#d5f1fb 45%,#c2ecfb 100%);min-height:100vh}
  .app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  .topbar{padding:18px 20px 14px;display:flex;align-items:center;gap:10px;
    background:linear-gradient(120deg,var(--aqua-500),var(--aqua-400));color:#fff;box-shadow:var(--shadow);
    border-bottom-left-radius:22px;border-bottom-right-radius:22px}
  .topbar .logo{font-size:26px}
  .topbar h1{font-size:17px;margin:0;font-weight:700}
  .topbar .sub{font-size:11px;opacity:.9;margin-top:1px}
  .content{flex:1;padding:18px 18px 40px}
  .card{background:#fff;border-radius:20px;padding:22px;box-shadow:var(--shadow);border:1px solid var(--aqua-100)}
  .card + .card{margin-top:16px}
  h2{font-size:16px;margin:0 0 14px;display:flex;align-items:center;gap:8px}
  label{font-size:13px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:6px}
  input{width:100%;padding:14px;border:2px solid var(--aqua-200);border-radius:14px;font-size:17px;color:var(--ink);background:var(--aqua-50)}
  input:focus{outline:none;border-color:var(--aqua-400);background:#fff;box-shadow:0 0 0 4px rgba(92,196,232,.18)}
  .btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:700;color:#fff;
    background:linear-gradient(120deg,var(--aqua-500),var(--aqua-600));box-shadow:0 6px 16px rgba(27,135,181,.3);cursor:pointer;margin-top:6px}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.5}
  .btn.ghost{background:#fff;color:var(--aqua-600);border:2px solid var(--aqua-300);box-shadow:none}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
  .err{color:var(--danger);font-size:13px;margin-top:8px;font-weight:600;min-height:18px}
  .me{background:var(--aqua-50);border:1px solid var(--aqua-200);border-radius:14px;padding:10px 14px;font-size:13px;color:var(--ink-soft);margin-bottom:14px}
  .me b{color:var(--aqua-600);font-size:15px}
  #reader{border-radius:16px;overflow:hidden;border:2px solid var(--aqua-200)}
  .hidden{display:none!important}
  .badge{display:inline-block;padding:3px 10px;border-radius:99px;background:var(--aqua-100);color:var(--aqua-700);font-size:12px;font-weight:700}
  .modal{position:fixed;inset:0;background:rgba(9,40,52,.45);display:flex;align-items:center;justify-content:center;padding:24px;z-index:20}
  .modal .box{background:#fff;border-radius:24px;padding:28px 24px;text-align:center;max-width:340px;width:100%;box-shadow:var(--shadow);animation:pop .3s cubic-bezier(.2,1.3,.5,1)}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .modal .emoji{font-size:54px}
  .modal h3{margin:8px 0 4px;font-size:20px}
  .modal .big{font-size:40px;font-weight:800;color:var(--aqua-600);margin:6px 0}
  .modal .bonus{margin:10px 0;padding:10px;background:linear-gradient(120deg,#fff6d6,#ffe9a8);border-radius:14px;color:#7a5c00;font-weight:700;font-size:14px}
  .spin{display:inline-block;width:18px;height:18px;border:3px solid var(--aqua-200);border-top-color:var(--aqua-500);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="logo">❄️</span>
    <div><h1>QRスキャン</h1><div class="sub">名札のQRコードを読み取ろう</div></div>
  </div>
  <div class="content">

    <!-- 生徒番号が未取得のとき -->
    <section id="scNeedId" class="card hidden">
      <h2>🔑 生徒番号の確認</h2>
      <div class="hint" style="margin-top:0">ログイン情報が引き継がれませんでした。生徒番号を入力してください。</div>
      <label style="margin-top:12px">生徒番号（7〜8桁の数字）</label>
      <input type="tel" id="sidInput" inputmode="numeric" placeholder="例：12345678" maxlength="8">
      <div class="err" id="sidErr"></div>
      <button class="btn" onclick="setSid()">次へ</button>
    </section>

    <!-- スキャン画面 -->
    <section id="scScan" class="hidden">
      <div class="card">
        <div class="me">生徒番号：<b id="meId">—</b></div>
        <h2>📸 QRコード読み取り</h2>
        <div id="reader"></div>
        <div class="err" id="scanErr"></div>
        <div class="hint">名札のQRコードをカメラに向けてください。読み取れない場合はスタッフにお知らせください（スタッフ用ツールで代替付与できます）。</div>
        <button class="btn ghost" id="backBtn" onclick="goApp()">アプリに戻る</button>
      </div>
    </section>

  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
/* ====================================================================
 *  設定：デプロイ後にここを自分の値へ書き換える
 * ==================================================================== */
var GAS_URL  = 'https://script.google.com/macros/s/AKfycbwxA0SMa4kK41IB8QXR4-HY7wH0Tr_-E_FYNFxjzbkiI61rKHSTpkSZDvgYfnYgg3ywew/exec'; // ← GASウェブアプリURL
var APP_URL  = GAS_URL;   // 「アプリに戻る」の遷移先（生徒用GAS画面）
/* ==================================================================== */

var me=null, qr=null, scanning=false, lastScanAt=0, busy=false;

/* ---- 生徒番号の取得：URLパラメータ ?sid= → localStorage の順 ---- */
function getParam(k){ return new URLSearchParams(location.search).get(k); }
window.addEventListener('load', function(){
  var sid = getParam('sid') || localStorage.getItem('sr_id');
  if(sid && /^[0-9]{7,8}$/.test(sid)){ me=sid; localStorage.setItem('sr_id', sid); startFlow(); }
  else { document.getElementById('scNeedId').classList.remove('hidden'); }
});
function setSid(){
  var v=document.getElementById('sidInput').value.trim();
  var e=document.getElementById('sidErr');
  if(!/^[0-9]+$/.test(v)){ e.textContent='数字のみで入力してください'; return; }
  if(v.length<7||v.length>8){ e.textContent='生徒番号は7〜8桁で入力してください'; return; }
  me=v; localStorage.setItem('sr_id', v);
  document.getElementById('scNeedId').classList.add('hidden');
  startFlow();
}
function startFlow(){
  document.getElementById('meId').textContent=me;
  document.getElementById('scScan').classList.remove('hidden');
  startScan();
}

/* ---- カメラ起動＆QR読取 ---- */
function startScan(){
  if(scanning) return;
  document.getElementById('scanErr').textContent='';
  qr=new Html5Qrcode("reader");
  scanning=true;
  qr.start({facingMode:"environment"},{fps:10,qrbox:{width:220,height:220}}, onScan, function(){})
    .catch(function(){ scanning=false; document.getElementById('scanErr').textContent='カメラを起動できませんでした。ブラウザのカメラ権限を許可してください。'; });
}
function stopScan(){
  if(qr && scanning){ scanning=false; qr.stop().then(function(){qr.clear();}).catch(function(){}); }
}
function onScan(text){
  var now=Date.now();
  if(busy || now-lastScanAt<2500) return;
  lastScanAt=now;
  stopScan();
  askLessons(text.trim());
}

/* ---- 授業数入力 → GASへ送信 ---- */
function askLessons(token){
  var box=document.createElement('div'); box.className='modal';
  box.innerHTML='<div class="box"><div class="emoji">📸</div><h3>QRを読み取りました</h3>'
    +'<div class="hint">今日その先生・スタッフの前で受けた授業数を入力してください（1〜10）</div>'
    +'<input type="number" id="lessonInput" min="1" max="10" value="1" style="margin:14px 0">'
    +'<div class="err" id="lessonErr"></div>'
    +'<button class="btn" id="lessonOk">スタンプを押す</button>'
    +'<button class="btn ghost" id="lessonCancel">キャンセル</button></div>';
  document.body.appendChild(box);
  document.getElementById('lessonCancel').onclick=function(){ box.remove(); startScan(); };
  document.getElementById('lessonOk').onclick=function(){
    var n=parseInt(document.getElementById('lessonInput').value,10);
    if(isNaN(n)||n<1||n>10){ document.getElementById('lessonErr').textContent='1〜10で入力してください'; return; }
    var b=document.getElementById('lessonOk'); b.disabled=true; b.innerHTML='送信中… <span class="spin"></span>';
    sendClaim(token, n, box);
  };
}

/* ---- CORS回避：text/plain の単純リクエストでPOST ---- */
function sendClaim(token, lessons, box){
  busy=true;
  fetch(GAS_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // ← application/json にしない（preflight回避）
    body: JSON.stringify({ action:'claim', studentId:me, staffToken:token, lessons:lessons })
  })
  .then(function(r){ return r.json(); })
  .then(function(r){
    busy=false; box.remove();
    if(!r.ok){ resultModal('⚠️','エラー', r.msg||'付与に失敗しました', null, null); return; }
    if(r.duplicate){ resultModal('🔁','読み取り済み', r.msg, null, null); return; }
    resultModal('✨','スタンプ獲得！','+'+r.added+' pt',
      r.bonus ? '🎉 スタッフ '+r.staffCount+' 人達成ボーナス +'+r.bonus+'pt！' : null,
      r.isNew ? 'はじめまして！' : 'ふたたび！');
  })
  .catch(function(){
    busy=false; box.remove();
    resultModal('⚠️','通信エラー','電波状況を確認してもう一度お試しください', null, null);
  });
}

function resultModal(emoji,title,big,bonus,sub){
  var m=document.createElement('div'); m.className='modal';
  m.innerHTML='<div class="box"><div class="emoji">'+emoji+'</div><h3>'+title+'</h3><div class="big">'+big+'</div>'
    +(sub?'<div class="badge">'+sub+'</div>':'')+(bonus?'<div class="bonus">'+bonus+'</div>':'')
    +'<button class="btn" id="rmOk">続けて読み取る</button>'
    +'<button class="btn ghost" id="rmBack">アプリに戻る</button></div>';
  document.body.appendChild(m);
  document.getElementById('rmOk').onclick=function(){ m.remove(); startScan(); };
  document.getElementById('rmBack').onclick=function(){ m.remove(); goApp(); };
}

/* ---- 生徒番号を付けてGASアプリへ戻る（ログイン状態の引き継ぎ） ---- */
function goApp(){
  stopScan();
  location.href = APP_URL + (APP_URL.indexOf('?')>=0?'&':'?') + 'sid=' + encodeURIComponent(me);
}
</script>
</body>
</html>
